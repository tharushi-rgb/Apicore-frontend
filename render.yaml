# render.yaml — Render deployment configuration for Apicore-frontend
# https://render.com/docs/render-yaml-spec
#
# Deploy as a Static Site on Render:
#   Build Command : npm install && npm run build
#   Publish Directory: dist
#
# After deploying, set VITE_API_URL in Environment Variables to your
# Apicore-backend Render URL, e.g.:
#   VITE_API_URL=https://apicore-backend.onrender.com/api

services:
  - type: web
    name: apicore-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: false
    envVars:
      - key: VITE_API_URL
        sync: false   # Set manually in the Render dashboard after deploying backend
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      # SPA fallback — serve index.html for all routes
      - type: rewrite
        source: /*
        destination: /index.html
