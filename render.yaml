# render.yaml — Render deployment configuration for Apicore-frontend
# https://render.com/docs/render-yaml-spec
#
# Deploy as a Static Site on Render:
#   Build Command : npm install && npm run build
#   Publish Directory: dist
#
# Supabase credentials are baked into the build (anon key is safe to expose).
# You can also override them via Environment Variables in the Render dashboard.

services:
  - type: web
    name: apicore-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: false
    envVars:
      - key: VITE_SUPABASE_URL
        sync: false   # Optionally override in Render dashboard
      - key: VITE_SUPABASE_ANON_KEY
        sync: false   # Optionally override in Render dashboard
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      # SPA fallback — serve index.html for all routes
      - type: rewrite
        source: /*
        destination: /index.html
